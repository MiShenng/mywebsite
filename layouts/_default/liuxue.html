{{ partial "header.html" . }}

<style>
.liuxue-main {
  max-width: 780px;
  margin: 48px auto;
  padding: 0 15px;
}

.liuxue-main-title {
  font-size: 1.5em;
  font-weight: 700;
  margin: 0 0 8px;
}

.liuxue-intro {
  color: #666;
  font-size: 0.95em;
  margin-bottom: 40px;
  line-height: 1.6;
}

.liuxue-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.liuxue-list li {
  border-bottom: 1px dashed #f0f0f0;
  padding: 20px 0;
}

.liuxue-list li:last-child {
  border-bottom: none;
}

.liuxue-list a {
  color: #1a1a1a;
  font-size: 1.3em;
  font-weight: 500;
  text-decoration: none;
  line-height: 1.4;
  transition: color 0.15s;
}

.liuxue-list a:hover {
  color: #4a7fa5;
}
</style>

<main class="liuxue-main">
  <h1 class="liuxue-main-title">{{ .Title }}</h1>
  <div class="liuxue-intro">{{ .Content }}</div>

  <ul class="liuxue-list">
    {{ range .Pages.ByDate.Reverse }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
</main>

{{ partial "footer.html" . }}
