<footer class="footer">
  {{ partial "comments.html" . }}
  {{ partial "foot_custom.html" . }}

  <!-- 第一行：社交媒体链接区 -->
  <div style="text-align: center; margin-bottom: 10px;">
    <span style="color: #666; font-size: 16px; margin-right: 10px; vertical-align: middle;">More information in</span>
    
    {{ with .Site.Params.social }}
      {{ with .github }}
      <a href="{{ . }}" target="_blank" title="GitHub" style="margin: 0 5px; color: #555; text-decoration: none; transition: color 0.3s; vertical-align: middle;">
        <i class="fa fa-github" style="font-size: 20px"></i>
      </a>
      {{ end }}
      
      {{ with .douban }}
      <a href="{{ . }}" target="_blank" title="豆瓣" style="margin: 0 5px; color: #555; text-decoration: none; transition: color 0.3s; vertical-align: middle;">
        <i class="fa fa-book" style="font-size: 18px"></i>
      </a>
      {{ end }}
      
      {{ with .facebook }}
      <a href="{{ . }}" target="_blank" title="Facebook" style="margin: 0 5px; color: #555; text-decoration: none; transition: color 0.3s; vertical-align: middle;">
        <i class="fa fa-facebook-square" style="font-size: 20px"></i>
      </a>
      {{ end }}
      
      {{ with .email }}
      <a href="mailto:{{ . }}" title="Email" style="margin: 0 5px; color: #555; text-decoration: none; transition: color 0.3s; vertical-align: middle;">
        <i class="fa fa-envelope" style="font-size: 18px"></i>
      </a>
      {{ end }}
    {{ end }}
  </div>

  <!-- 第二行：版权信息 -->
  <div class="copyright-text" style="text-align: center; color: #888; font-size: 14px;">
    &copy; Lizao 2024-2026
  </div>

</footer>
