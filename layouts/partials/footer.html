<style>
  /* 极简高级感 Footer 样式 */
  .custom-footer {
    text-align: center;
    padding: 20px 0 40px; /* 控制上下留白 */
    font-family: Charter, Georgia, 'Helvetica Neue', Arial,
      'Songti SC', 'SimSun', 'Hiragino Sans GB', '宋体', 'Microsoft YaHei',
      'STKaiti', 'Kai', 'Kaiti SC', 'KaiTi', 'KaiTi_GB2312', '楷体', sans-serif;
  }
  
  .footer-social-line {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 8px; /* 第一行和第二行的间距 */
  }

  .footer-text-prefix {
    color: #666666;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-right: 12px;
  }

  .footer-social-icons {
    display: flex;
    align-items: center;
    gap: 12px; /* 图标之间的间距 */
  }

  .footer-social-icons a {
    color: #666666;
    text-decoration: none;
    font-size: 22px;
    transition: color 0.3s ease, transform 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer-social-icons a i {
    line-height: 1;
  }

  /* 悬停动效：微微上浮并分别赋予独立颜色 */
  .footer-social-icons a:hover {
    transform: translateY(-2px);
  }
  
  .social-github:hover { color: #333333 !important; }
  
  /* 用 mask 把豆瓣位图转为单色图标，行为与字体图标一致 */
  .social-douban .douban-icon {
    width: 21px;
    height: 21px;
    display: block;
    background-color: currentColor;
    -webkit-mask-image: url('/media/douban.png');
    mask-image: url('/media/douban.png');
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-size: contain;
    mask-size: contain;
  }
  .social-douban:hover { color: #007722 !important; } /* 豆瓣绿 */

  .social-facebook:hover { color: #1877F2 !important; } /* Facebook 蓝 */
  .social-email:hover { color: #D44638 !important; } /* 邮箱红 */

  .footer-copyright {
    color: #666666;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
</style>

<footer class="custom-footer">
  {{ partial "comments.html" . }}
  {{ partial "foot_custom.html" . }}

  <!-- 第一行：社交媒体链接区 -->
  <div class="footer-social-line">
    <span class="footer-text-prefix">More information in</span>
    
    <div class="footer-social-icons">
    {{ with .Site.Params.social }}
      {{ if .github }}
      <a href="{{ .github }}" class="social-github" target="_blank" title="GitHub">
        <i class="fa fa-github"></i>
      </a>
      {{ end }}
      
      {{ if .douban }}
      <a href="{{ .douban }}" class="social-douban" target="_blank" title="Douban">
        <span class="douban-icon" aria-hidden="true"></span>
      </a>
      {{ end }}
      
      {{ if .facebook }}
      <a href="{{ .facebook }}" class="social-facebook" target="_blank" title="Facebook">
        <i class="fa fa-facebook-square"></i>
      </a>
      {{ end }}
      
      {{ if .email }}
      <a href="mailto:{{ .email }}" class="social-email" title="Email">
        <i class="fa fa-envelope"></i>
      </a>
      {{ end }}
    {{ end }}
    </div>
  </div>

  <!-- 第二行：版权信息 -->
  <div class="footer-copyright">
    &copy; Lizao 2024-2026
  </div>

</footer>
