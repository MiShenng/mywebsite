<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>中国数据新闻大赛获奖作品分析</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
	<style>
		body {
			background-color: #f3f4f6;
			font-family: sans-serif;
		}
		.chart-container {
			height: 400px;
			width: 100%;
		}
	</style>
</head>
<body class="p-6">

	<div class="max-w-7xl mx-auto">
		<header class="mb-8 text-center">
			<h1 class="text-3xl font-bold text-gray-800 mb-2">中国数据新闻大赛获奖作品深度剖析</h1>
			<p class="text-gray-500">基于近四届精简数据的文本与叙事特征可视化呈现</p>
		</header>

		<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
			<!-- 图表一 核心议题演变趋势 -->
			<div class="bg-white rounded-xl shadow-sm p-4">
				<div id="chart1" class="chart-container"></div>
			</div>

			<!-- 图表二 情感色彩占比分布 -->
			<div class="bg-white rounded-xl shadow-sm p-4">
				<div id="chart2" class="chart-container"></div>
			</div>

			<!-- 图表三 标题叙事结构剖析 -->
			<div class="bg-white rounded-xl shadow-sm p-4">
				<div id="chart3" class="chart-container"></div>
			</div>

			<!-- 图表四 核心热点高频词汇 -->
			<div class="bg-white rounded-xl shadow-sm p-4">
				<div id="chart4" class="chart-container"></div>
			</div>

		</div>
	</div>

	<script>
		// 定义通用调色盘
		const colorPalette = ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452', '#9a60b4', '#ea7ccc'];

		// 图表一 核心议题演变趋势图 河流图堆叠面积
		const chart1 = echarts.init(document.getElementById('chart1'));
		const option1 = {
			title: {
				text: '核心议题演变趋势',
				left: 'center',
				textStyle: { color: '#333', fontSize: 16 }
			},
			tooltip: {
				trigger: 'axis',
				axisPointer: { type: 'cross', label: { backgroundColor: '#6a7985' } }
			},
			legend: {
				data: ['宏观突发', '社会结构', '基层精神', '微观权益'],
				bottom: 0
			},
			grid: {
				left: '3%', right: '4%', bottom: '10%', containLabel: true
			},
			xAxis: [
				{
					type: 'category',
					boundaryGap: false,
					data: ['第七届', '第八届', '第九届', '第十届']
				}
			],
			yAxis: [
				{ type: 'value' }
			],
			color: ['#ee6666', '#fac858', '#91cc75', '#5470c6'],
			series: [
				{
					name: '宏观突发',
					type: 'line',
					stack: 'Total',
					areaStyle: {},
					emphasis: { focus: 'series' },
					data: [30, 15, 10, 5]
				},
				{
					name: '社会结构',
					type: 'line',
					stack: 'Total',
					areaStyle: {},
					emphasis: { focus: 'series' },
					data: [10, 35, 20, 15]
				},
				{
					name: '基层精神',
					type: 'line',
					stack: 'Total',
					areaStyle: {},
					emphasis: { focus: 'series' },
					data: [5, 15, 40, 20]
				},
				{
					name: '微观权益',
					type: 'line',
					stack: 'Total',
					areaStyle: {},
					emphasis: { focus: 'series' },
					data: [5, 10, 15, 45]
				}
			]
		};
		chart1.setOption(option1);

		// 图表二 情感色彩占比分布图 南丁格尔玫瑰图
		const chart2 = echarts.init(document.getElementById('chart2'));
		const option2 = {
			title: {
				text: '情感色彩占比分布',
				left: 'center',
				textStyle: { color: '#333', fontSize: 16 }
			},
			tooltip: {
				trigger: 'item',
				formatter: '{a} <br/>{b} {c}%'
			},
			legend: {
				bottom: 0
			},
			color: ['#5c7bd9', '#91cc75', '#fac858'],
			series: [
				{
					name: '情感倾向',
					type: 'pie',
					radius: [30, 120],
					center: ['50%', '50%'],
					roseType: 'area',
					itemStyle: {
						borderRadius: 8
					},
					data: [
						{ value: 45, name: '焦虑沉重痛点类' },
						{ value: 30, name: '积极希望守护类' },
						{ value: 25, name: '中立客观叙事类' }
					]
				}
			]
		};
		chart2.setOption(option2);

		// 图表三 标题叙事结构剖析图 矩形树状图
		const chart3 = echarts.init(document.getElementById('chart3'));
		const option3 = {
			title: {
				text: '标题叙事结构剖析',
				left: 'center',
				textStyle: { color: '#333', fontSize: 16 }
			},
			tooltip: {
				formatter: '{b} 数量 {c}篇'
			},
			series: [{
				type: 'treemap',
				width: '90%',
				height: '80%',
				roam: false,
				nodeClick: false,
				breadcrumb: { show: false },
				itemStyle: {
					borderColor: '#fff',
					borderWidth: 2,
					gapWidth: 2
				},
				color: ['#5470c6', '#73c0de', '#91cc75'],
				data: [
					{
						name: '复合主副标题结构',
						value: 444,
						label: { show: true, formatter: '{b}\n\n{c}篇' }
					},
					{
						name: '悬念疑问句式结构',
						value: 118,
						label: { show: true, formatter: '{b}\n\n{c}篇' }
					},
					{
						name: '常规平铺直叙结构',
						value: 106,
						label: { show: true, formatter: '{b}\n\n{c}篇' }
					}
				]
			}]
		};
		chart3.setOption(option3);

		// 图表四 核心热点高频词汇图 词云图
		const chart4 = echarts.init(document.getElementById('chart4'));
		const option4 = {
			title: {
				text: '核心热点高频词汇',
				left: 'center',
				textStyle: { color: '#333', fontSize: 16 }
			},
			tooltip: {
				show: true
			},
			series: [{
				type: 'wordCloud',
				shape: 'circle',
				keepAspect: true,
				left: 'center',
				top: 'center',
				width: '90%',
				height: '90%',
				sizeRange: [14, 50],
				rotationRange: [-45, 45],
				rotationStep: 45,
				gridSize: 8,
				drawOutOfBound: false,
				textStyle: {
					fontFamily: 'sans-serif',
					fontWeight: 'bold',
					color: function () {
						return 'rgb(' + [
							Math.round(Math.random() * 160),
							Math.round(Math.random() * 160),
							Math.round(Math.random() * 160)
						].join(',') + ')';
					}
				},
				emphasis: {
					focus: 'self',
					textStyle: {
						shadowBlur: 10,
						shadowColor: '#333'
					}
				},
				data: [
					{ name: '困境', value: 24 },
					{ name: '城市', value: 22 },
					{ name: '生态', value: 17 },
					{ name: '经济', value: 17 },
					{ name: '女性', value: 16 },
					{ name: '突围', value: 16 },
					{ name: '教育', value: 15 },
					{ name: '生存', value: 15 },
					{ name: '乡村', value: 14 },
					{ name: '文物', value: 12 },
					{ name: '非遗', value: 11 },
					{ name: '健康', value: 10 },
					{ name: '外卖', value: 10 },
					{ name: '年轻人', value: 10 },
					{ name: '生育', value: 9 },
					{ name: '养老', value: 9 },
					{ name: '医疗', value: 8 },
					{ name: '算法', value: 7 },
					{ name: '网暴', value: 3 }
				]
			}]
		};
		chart4.setOption(option4);

		// 响应式自适应
		window.addEventListener('resize', function() {
			chart1.resize();
			chart2.resize();
			chart3.resize();
			chart4.resize();
		});
	</script>
</body>
</html>
