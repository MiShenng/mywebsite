    </button>
  </div>
  <a id="cv-download-link" href="/media/chinese_cv.pdf" target="_blank"

<div style="margin-top: 8px;">
  <iframe id="cv-frame" src="/media/chinese_cv.pdf"
    width="100%" height="850px"
    style="border: 1px solid #ddd; border-radius: 4px; display: block;">
  </iframe>
</div>
<script>
function switchCV(lang) {
  var frame = document.getElementById('cv-frame');
  var dlLink = document.getElementById('cv-download-link');
  var btnEn = document.getElementById('btn-en');
  var btnCn = document.getElementById('btn-cn');
  if (lang === 'en') {
    frame.src = '/media/english_cv.pdf';
    dlLink.href = '/media/english_cv.pdf';
    dlLink.textContent = 'Download PDF';
    btnEn.style.background = '#333'; btnEn.style.color = '#fff';
    btnCn.style.background = '#fff'; btnCn.style.color = '#333';
  } else {
    frame.src = '/media/chinese_cv.pdf';
    dlLink.href = '/media/chinese_cv.pdf';
    dlLink.textContent = '下载简历';
    btnCn.style.background = '#333'; btnCn.style.color = '#fff';
    btnEn.style.background = '#fff'; btnEn.style.color = '#333';
  }
}
</script>
